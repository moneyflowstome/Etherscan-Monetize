services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tokenaltcoin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tokenaltcoin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenaltcoin"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      DATABASE_URL: postgresql://tokenaltcoin:${POSTGRES_PASSWORD}@db:5432/tokenaltcoin
      PORT: "5000"
      NODE_ENV: production
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
      CMC_API_KEY: ${CMC_API_KEY}
      CHANGENOW_API_KEY: ${CHANGENOW_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      OPENSEA_API_KEY: ${OPENSEA_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  certbot_data:
  certbot_www:
